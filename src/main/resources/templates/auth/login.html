<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div class="form-card">
        <h2>Login</h2>
        <div class="alert alert-error" th:if="${param.error}">Invalid email or password.</div>
        <div class="alert alert-success" th:if="${param.logout}">Logged out successfully.</div>
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="username" required placeholder="Enter your email"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password"/>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
        <p class="text-center mt-1">Don't have an account? <a th:href="@{/auth/register}">Register</a></p>
    </div>
</div>
</body>
</html>
