<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Profile')}">
    <title>My Profile | VRental</title>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="form-card">
        <h2>My Profile</h2>
        <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
        <p><strong>Role:</strong> <span class="badge" th:text="${user.role}"></span></p>
        <hr style="margin:1rem 0"/>
        <form th:action="@{/profile/update}" method="post">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name" type="text" name="name" th:value="${user.name}" required/>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input id="phone" type="tel" name="phone" th:value="${user.phone}"/>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input id="address" type="text" name="address" th:value="${user.address}"/>
            </div>
            <hr style="margin:1rem 0"/>
            <h3 style="margin-bottom:.5rem">Change Password (Optional)</h3>
            <div class="form-group">
                <label for="currentPassword">Current Password</label>
                <input id="currentPassword" type="password" name="currentPassword" placeholder="Enter current password"/>
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input id="newPassword" type="password" name="newPassword" placeholder="Min 6 characters"/>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input id="confirmPassword" type="password" name="confirmPassword" placeholder="Re-enter new password"/>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Update Profile</button>
        </form>
    </div>
</div>
</body>
</html>
