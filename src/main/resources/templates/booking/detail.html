<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Booking Detail')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="detail-card">
        <h2>Booking #<span th:text="${booking.id}"></span></h2>
        <p><strong>Vehicle:</strong> <span th:text="${booking.vehicle.brand + ' ' + booking.vehicle.model}"></span></p>
        <p><strong>From:</strong> <span th:text="${booking.startDate}"></span></p>
        <p><strong>To:</strong> <span th:text="${booking.endDate}"></span></p>
        <p><strong>GPS:</strong> <span th:text="${booking.withGps ? 'Yes' : 'No'}"></span></p>
        <p><strong>Insurance:</strong> <span th:text="${booking.withInsurance ? 'Yes' : 'No'}"></span></p>
        <p><strong>Child Seat:</strong> <span th:text="${booking.withChildSeat ? 'Yes' : 'No'}"></span></p>
        <p><strong>Total:</strong> ₹<span th:text="${booking.totalAmount}"></span></p>
        <p><strong>Status:</strong> <span class="badge" th:text="${booking.status}"></span></p>
        <form th:action="@{/bookings/{id}/cancel(id=${booking.id})}" method="post"
              th:if="${booking.status.name() == 'CONFIRMED'}">
            <button type="submit" class="btn btn-danger" onclick="return confirm('Cancel booking?')">Cancel Booking</button>
        </form>
        <a th:href="@{/bookings/my}" class="btn btn-secondary">My Bookings</a>
    </div>
</div>
</body>
</html>
