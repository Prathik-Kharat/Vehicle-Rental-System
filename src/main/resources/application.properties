# ── App ──
spring.application.name=vehicle-rental-system
server.port=8080
spring.profiles.default=dev

# ── Database: H2 (dev default, zero setup) ──
# NOTE: H2 2.2+ rejects certain legacy URL option combinations (AUTO_SERVER + DB_CLOSE_ON_EXIT).
# Remove unsupported options to avoid "Feature not supported: \"AUTO_SERVER=TRUE && DB_CLOSE_ON_EXIT=FALSE\"".
# Use a simple file-based DB URL (persistent) or in-memory for quick dev runs.
# Persistent (file) DB without unsupported options:
spring.datasource.url=jdbc:h2:file:./vrental-db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── Thymeleaf ──
spring.thymeleaf.cache=false

